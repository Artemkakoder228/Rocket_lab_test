<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Дерево Розробок | Rocket Lab</title>
    <link rel="stylesheet" href="/static/CSS/command_center.css">
</head>
<body>
    <div class="space-background">
        <div class="stars"></div>
        <div class="stars2"></div>
        <div class="stars3"></div>
    </div>

    <div class="tree-container">
        
        <svg class="tree-lines">
            <line x1="50%" y1="15%" x2="25%" y2="45%" class="connection-line" />
            <line x1="50%" y1="15%" x2="50%" y2="45%" class="connection-line" />
            <line x1="50%" y1="15%" x2="75%" y2="45%" class="connection-line" />
            
            <line x1="50%" y1="45%" x2="50%" y2="75%" class="connection-line" />
        </svg>

        <div class="tree-node active" style="top: 15%; left: 50%;">
            <div class="node-icon">🏢</div> 
            <div class="node-name">Центр Командування</div>
            <div class="node-lvl">Рівень MAX</div>
        </div>

        <div class="tree-node available" style="top: 45%; left: 25%;">
            <div class="node-icon"><img src="/static/images/Blasters.png" alt="Бластери" width="40"></div>
            <div class="node-name">Зброя (Бластери)</div>
            <div class="node-cost">💰 5,000</div>
        </div>

        <div class="tree-node active" style="top: 45%; left: 50%;">
            <div class="node-icon"><img src="/static/images/Korpus.png" alt="Корпус" width="40"></div>
            <div class="node-name">Корпус</div>
            <div class="node-lvl">Рівень 2</div>
        </div>

        <div class="tree-node locked" style="top: 45%; left: 75%;">
            <div class="node-icon"><img src="/static/images/Turbina.png" alt="Турбіна" width="40"></div>
            <div class="node-name">Двигуни</div>
            <div class="node-cost">🔒 Потрібен Центр 3</div>
        </div>

        <div class="tree-node available" style="top: 75%; left: 50%;">
            <div class="node-icon"><img src="/static/images/Titan.png" alt="Титан" width="40"></div>
            <div class="node-name">Титанова броня</div>
            <div class="node-cost">💰 12,000</div>
        </div>

    </div>
</body>
</html>
