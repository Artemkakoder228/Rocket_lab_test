<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Центр Командування</title>
    <link rel="stylesheet" href="/static/CSS/command_center.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div class="header">
        <h1>Центр Командування</h1>
        <div class="resources-bar" id="resources-bar">
            </div>
    </div>

    <div class="cc-tree-container">
        
        <svg class="cc-lines" width="100%" height="100%">
            <line x1="50%" y1="50%" x2="50%" y2="15%" class="tech-line" id="line-w1" />
            <line x1="50%" y1="50%" x2="15%" y2="50%" class="tech-line" id="line-w2" />
            <line x1="50%" y1="50%" x2="50%" y2="85%" class="tech-line" id="line-w3" />
            <line x1="50%" y1="50%" x2="85%" y2="50%" class="tech-line" id="line-w4" />
        </svg>

        <div class="tech-node center-node locked" id="node-cc_lvl" onclick="openModuleModal('cc_lvl')">
            <img src="/static/images/ЦЕНТ КОМАНДУВАННЯ.jpg" alt="Центр">
            <span class="node-label">Командний Центр</span>
            <div class="lvl-badge" id="cc-lvl-badge">Lvl 1</div>
        </div>

        <div class="tech-node peripheral-node top-node locked" id="node-cc_w1" onclick="openModuleModal('cc_w1')">
            <div class="icon-placeholder">🔫</div>
            <span class="node-label">Лазерна Батарея</span>
        </div>

        <div class="tech-node peripheral-node left-node locked" id="node-cc_w2" onclick="openModuleModal('cc_w2')">
            <div class="icon-placeholder">⚡</div>
            <span class="node-label">Іонна Гармата</span>
        </div>

        <div class="tech-node peripheral-node bottom-node locked" id="node-cc_w3" onclick="openModuleModal('cc_w3')">
            <div class="icon-placeholder">🔥</div>
            <span class="node-label">Плазмовий Випромінювач</span>
        </div>

        <div class="tech-node peripheral-node right-node locked" id="node-cc_w4" onclick="openModuleModal('cc_w4')">
            <div class="icon-placeholder">🌌</div>
            <span class="node-label">Орбітальний Удар</span>
        </div>
    </div>

    <div id="module-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <h2 id="modal-title">Назва Модуля</h2>
            <div class="modal-body">
                <p id="modal-desc" class="desc-text"></p>
                <div class="stats-box" id="modal-stats"></div>
                <div class="cost-box" id="modal-cost"></div>
            </div>
            <button id="buy-btn" class="action-btn" onclick="buyModule()">Покращити</button>
        </div>
    </div>

    <script src="/static/JS/config.js"></script>
    <script src="/static/JS/command_center.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</body>
</html>
