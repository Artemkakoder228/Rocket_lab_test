<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Black Market | Rocket Lab</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="CSS/shop.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div class="stars-bg"></div>

    <header class="shop-header">
        <div class="header-left">
            <h1>ЧОРНИЙ РИНОК</h1>
        </div>
        <div class="balance-badge">
            🪙 <span id="user-balance">...</span>
        </div>
    </header>

    <main class="shop-container">
        <div class="timer-box">
            <span class="timer-label">ОНОВЛЕННЯ АСОРТИМЕНТУ ЧЕРЕЗ:</span>
            <div id="countdown" class="timer-value">00:00:00</div>
        </div>

        <div class="offers-grid" id="offers-container">
            <div class="loading-text">Встановлення зв'язку з торговцями...</div>
        </div>
    </main>

    <div id="toast" class="toast hidden">Успішно придбано!</div>

    <script src="JS/shop.js"></script>
</body>
</html>
