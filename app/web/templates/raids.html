<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Тактична Карта Рейдів</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #000; color: white; touch-action: none;
        }

        #map-viewport {
            width: 100vw; height: 100vh; position: relative; overflow: hidden; cursor: grab;
        }
        #map-viewport:active { cursor: grabbing; }

       #map-content {
            width: 2000px; height: 2000px; position: absolute; transform-origin: 0 0;
            background-repeat: repeat;
            background-size: 500px 500px; 
            box-shadow: inset 0 0 150px rgba(0,0,0,1);
            will-change: transform;
        }
     
        #planet-bg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
            background-repeat: repeat;
            background-size: 800px 800px; 
            opacity: 0.5; pointer-events: none;
        }

        #map-viewport::after {
            content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            pointer-events: none; box-shadow: inset 0 0 100px rgba(0,0,0,0.8);
        }

        .hud-top {
            position: fixed; top: 15px; left: 15px; right: 15px;
            background: rgba(5, 10, 20, 0.85); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 243, 255, 0.4); border-radius: 12px;
            padding: 12px 20px; display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 5px 20px rgba(0, 243, 255, 0.15); z-index: 100;
        }
        .hud-top h3 { margin: 0; font-size: 15px; color: #00f3ff; letter-spacing: 2px;}
        .hud-top p { margin: 2px 0 0; font-size: 12px; color: #a1b5cc; font-weight: bold;}

        .colony-marker {
            position: absolute; transform: translate(-50%, -50%);
            display: flex; flex-direction: column; align-items: center;
            cursor: pointer; z-index: 5;
        }
        .colony-icon {
            width: 50px; height: 50px; background: rgba(255, 50, 50, 0.15);
            border: 2px solid #ff3232; border-radius: 8px; transform: rotate(45deg);
            display: flex; justify-content: center; align-items: center;
            box-shadow: 0 0 20px rgba(255, 50, 50, 0.6), inset 0 0 10px rgba(255,50,50,0.4);
            animation: pulse-base 2.5s infinite alternate; transition: 0.2s;
        }
        .colony-icon span { font-size: 22px; transform: rotate(-45deg); display: block;}
        .colony-marker:active .colony-icon { background: rgba(255,50,50,0.5); transform: rotate(45deg) scale(0.9);}

        .colony-name {
            background: rgba(0,0,0,0.8); padding: 4px 10px; border-radius: 6px;
            font-size: 14px; margin-top: 15px; color: #fff; border: 1px solid rgba(0, 243, 255, 0.3);
            white-space: nowrap; font-weight: bold; letter-spacing: 1px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.8);
        }
        @keyframes pulse-base { to { box-shadow: 0 0 5px rgba(255, 50, 50, 0.3); } }

        #modal-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
            display: none; justify-content: center; align-items: center; z-index: 200;
            opacity: 0; transition: opacity 0.3s;
        }
        .target-modal {
            background: #080c14; border: 1px solid #00f3ff; border-radius: 16px;
            width: 85%; max-width: 340px; padding: 25px 20px;
            box-shadow: 0 10px 40px rgba(0, 243, 255, 0.15);
            transform: scale(0.9); transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative; overflow: hidden;
        }
        .target-modal::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 4px; background: linear-gradient(90deg, transparent, #00f3ff, transparent); }
        
        .modal-header { font-size: 18px; font-weight: 800; color: #fff; margin-bottom: 20px; text-align: center; }
        
        .modal-mine-icon {
            width: 140px; height: 140px; display: block; margin: 0 auto 20px; 
            border: 2px solid rgba(0, 243, 255, 0.4); border-radius: 16px; 
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.2); object-fit: cover;
        }

        .stat-row { display: flex; justify-content: space-between; margin-bottom: 12px; font-size: 15px; background: rgba(255,255,255,0.03); padding: 8px 12px; border-radius: 6px;}
        .stat-row span { color: #8ba4b8; }
        .stat-row strong { color: #00f3ff; }
        .stat-row .chance-high { color: #00ff88; text-shadow: 0 0 8px #00ff88;}
        .stat-row .chance-med { color: #ffd700; text-shadow: 0 0 8px #ffd700;}
        .stat-row .chance-low { color: #ff3232; text-shadow: 0 0 8px #ff3232;}

        .attack-btn {
            width: 100%; padding: 16px; margin-top: 15px;
            background: linear-gradient(90deg, #d30000, #ff3232, #d30000); background-size: 200% auto;
            border: none; border-radius: 10px; color: white; font-weight: 800; font-size: 16px; letter-spacing: 1px;
            box-shadow: 0 6px 20px rgba(255, 50, 50, 0.5); cursor: pointer; transition: 0.3s;
        }
        .attack-btn:active { transform: scale(0.95); }
        
        .close-btn {
            width: 100%; padding: 12px; margin-top: 10px; background: transparent;
            border: 1px solid rgba(255,255,255,0.15); border-radius: 10px; color: #8ba4b8;
            font-size: 14px; font-weight: bold; cursor: pointer; transition: 0.2s;
        }
        .close-btn:active { background: rgba(255,255,255,0.1); }

        #loader {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: #00f3ff; font-family: monospace; font-size: 18px; text-align: center;
            z-index: 500; text-shadow: 0 0 10px #00f3ff;
        }

        /* --- СТИЛІ ДЛЯ СТАТУСУ ОБЛОГИ ТА ПРОГРЕСУ --- */
        .progress-container {
            width: 100%; height: 10px; background: #1a202c; 
            border-radius: 5px; margin: 15px 0; overflow: hidden; border: 1px solid #2d3748;
        }
        .progress-bar {
            width: 100%; height: 100%; background: linear-gradient(90deg, #ff3232, #ff8c00);
            transition: width 1s linear;
        }
        .status-siege { color: #ff3232; font-weight: 800; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.5; } }
    </style>
</head>
<body>

    <div id="map-viewport">
        <div id="map-content">
            <div id="planet-bg"></div>
            </div>
    </div>

    <div class="hud-top">
        <div>
            <h3 id="hud-planet">ПІДКЛЮЧЕННЯ...</h3>
            <p id="hud-power">Сканування систем...</p>
        </div>
        <button onclick="tg.close()" style="background:rgba(255,50,50,0.2); border:1px solid #ff3232; color:#ff3232; width: 40px; height: 40px; border-radius: 10px; font-size:22px; display:flex; justify-content:center; align-items:center;">×</button>
    </div>

    <div id="loader">🌍<br>Підключення до супутника...</div>

    <div id="modal-overlay">
        <div class="target-modal" id="modal-content">
            <div class="modal-header" id="m-name">Колонія: Невідомо</div>
            
            <img id="m-icon" src="" alt="Mine Icon" class="modal-mine-icon" style="display: none;">

            <div class="stat-row"><span>🏭 Рівень шахти:</span> <strong id="m-mine">1</strong></div>
            <div class="stat-row"><span>⚔️ Оборона:</span> <strong id="m-power">0</strong></div>
            <div class="stat-row"><span>⏱️ Час рейду:</span> <strong id="m-time">0 хв</strong></div>
            <div class="stat-row"><span>💰 Лут:</span> <strong style="color: #ffd700; text-shadow: 0 0 5px #ffd700;" id="m-loot">0 🪙</strong></div>
            
            <div class="stat-row" style="margin-top: 15px; border-top: 1px dashed rgba(0, 243, 255, 0.3); padding-top: 15px; background: transparent;">
                <span>🎯 Шанс перемоги:</span> <strong id="m-chance">0%</strong>
            </div>

            <button class="attack-btn" id="m-attack-btn">🚀 АТАКУВАТИ</button>
            <button class="close-btn" onclick="closeModal()">ВІДМІНА</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.setHeaderColor('#050a14');
        tg.setBackgroundColor('#000000');

        const urlParams = new URLSearchParams(window.location.search);
        const familyId = urlParams.get('family_id');
        const userId = urlParams.get('user_id');

        const mapViewport = document.getElementById('map-viewport');
        const mapContent = document.getElementById('map-content');
        const planetBg = document.getElementById('planet-bg');
        
        const overlay = document.getElementById('modal-overlay');
        const modalContent = document.getElementById('modal-content');
        let currentTarget = null;
        let currentPlanetImg = ""; 

        // --- ЛОГІКА КАМЕРИ ---
        const MAP_SIZE = 2000;
        let scale = window.innerWidth / 1000;
        scale = Math.max(0.5, Math.min(scale, 1.2));
        
        let panX = (window.innerWidth - MAP_SIZE * scale) / 2;
        let panY = (window.innerHeight - MAP_SIZE * scale) / 2;
        
        let isDragging = false;
        let startX, startY;
        let initialPinchDist = null;
        let initialScale = 1;

        function updateTransform() {
            const maxPanX = window.innerWidth / 2;
            const minPanX = window.innerWidth / 2 - MAP_SIZE * scale;
            const maxPanY = window.innerHeight / 2;
            const minPanY = window.innerHeight / 2 - MAP_SIZE * scale;

            panX = Math.max(minPanX, Math.min(panX, maxPanX));
            panY = Math.max(minPanY, Math.min(panY, maxPanY));

            mapContent.style.transform = `translate(${panX}px, ${panY}px) scale(${scale})`;
        }
        updateTransform();

        mapViewport.addEventListener('touchstart', (e) => {
            if(e.target.closest('.colony-marker')) return;
            if (e.touches.length === 1) {
                isDragging = true;
                startX = e.touches[0].clientX - panX;
                startY = e.touches[0].clientY - panY;
            } else if (e.touches.length === 2) {
                isDragging = false;
                initialPinchDist = getDistance(e.touches);
                initialScale = scale;
            }
        }, { passive: false });

        mapViewport.addEventListener('touchmove', (e) => {
            e.preventDefault(); 
            if (e.touches.length === 1 && isDragging) {
                panX = e.touches[0].clientX - startX;
                panY = e.touches[0].clientY - startY;
                updateTransform();
            } else if (e.touches.length === 2) {
                const currentDist = getDistance(e.touches);
                const newScale = initialScale * (currentDist / initialPinchDist);
                scale = Math.max(0.4, Math.min(newScale, 2.5)); 
                updateTransform();
            }
        }, { passive: false });

        mapViewport.addEventListener('touchend', () => {
            isDragging = false;
            initialPinchDist = null;
        });

        mapViewport.addEventListener('mousedown', (e) => {
            if(e.target.closest('.colony-marker')) return;
            isDragging = true;
            startX = e.clientX - panX;
            startY = e.clientY - panY;
        });
        window.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            panX = e.clientX - startX;
            panY = e.clientY - startY;
            updateTransform();
        });
        window.addEventListener('mouseup', () => isDragging = false);
        mapViewport.addEventListener('wheel', (e) => {
            const zoomIntensity = 0.1;
            if (e.deltaY < 0) scale *= (1 + zoomIntensity); else scale /= (1 + zoomIntensity);
            scale = Math.max(0.4, Math.min(scale, 2.5));
            updateTransform();
        });

        function getDistance(touches) {
            return Math.hypot(touches[0].clientX - touches[1].clientX, touches[0].clientY - touches[1].clientY);
        }

        // --- ЗАВАНТАЖЕННЯ ДАНИХ ---
        async function fetchTargets() {
            try {
                const response = await fetch(`/api/raid/targets?family_id=${familyId}`);
                const data = await response.json();

                document.getElementById('loader').style.display = 'none';
                if (data.error) { alert(data.error); return; }

                document.getElementById('hud-planet').innerText = `СЕКТОР: ${data.planet}`;
                document.getElementById('hud-power').innerText = `Рівень флоту: ${data.my_power}`;
                
                const p = data.planet.toLowerCase();
                currentPlanetImg = p; 
                
                const bgUrl = `url('images/raid_bg_${p}.png')`;
                mapContent.style.backgroundImage = bgUrl;
                planetBg.style.backgroundImage = bgUrl;

                if (data.targets.length === 0) {
                    const msg = document.createElement('div');
                    msg.innerHTML = "СЕКТОР ПОРОЖНІЙ";
                    msg.style.cssText = "position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); color:#00f3ff; font-size:30px; font-weight:bold; letter-spacing:5px;";
                    mapContent.appendChild(msg);
                    return;
                }

                data.targets.forEach(target => {
                    createMarker(target);
                });

            } catch (err) {
                document.getElementById('loader').innerText = "ПОМИЛКА ЗВ'ЯЗКУ";
                console.error("Fetch Error:", err);
            }
        }

        // --- ВІЗУАЛІЗАЦІЯ МАРКЕРІВ (З ЕФЕКТОМ ВИБУХУ) ---
        function createMarker(target) {
            const marker = document.createElement('div');
            marker.className = 'colony-marker';
            marker.style.top = target.y + 'px';
            marker.style.left = target.x + 'px';
            
            // Якщо під атакою — показуємо ВИБУХ замість звичайної іконки
            const iconContent = target.under_attack ? "💥" : "<span>🏭</span>";
            const iconStyle = target.under_attack ? "border-color:#ff8c00; box-shadow:0 0 30px #ff3232; animation: none;" : "";
            
            marker.innerHTML = `
                <div class="colony-icon" style="${iconStyle}">${iconContent}</div>
                <div class="colony-name">${target.name}</div>
            `;
            
            marker.onclick = () => openModal(target);
            mapContent.appendChild(marker);
        }

        // --- ЛОГІКА БОЮ ТА МОДАЛОК ---
        function openModal(target) {
            currentTarget = target;
            tg.HapticFeedback.selectionChanged();
            
            document.getElementById('m-name').innerText = `${target.name}`;
            
            const imgEl = document.getElementById('m-icon');
            if (currentPlanetImg) {
                imgEl.src = `images/raid_mine_${currentPlanetImg}.png`;
                imgEl.style.display = 'block';
            }

            const modalBody = document.getElementById('modal-content');
            const attackBtn = document.getElementById('m-attack-btn');
            
            // Очищуємо старі прогрес-бари, якщо вони були з попереднього кліку
            const oldBar = document.querySelector('.progress-container');
            if(oldBar) oldBar.remove();

            // ЯКЩО БАЗА ПІД АТАКОЮ -> Ховаємо кнопку, показуємо прогрес-бар
            if (target.under_attack) {
                attackBtn.style.display = 'none';
                
                const timerContainer = document.createElement('div');
                timerContainer.className = 'progress-container';
                timerContainer.innerHTML = '<div class="progress-bar" id="p-bar"></div>';
                modalBody.insertBefore(timerContainer, attackBtn);

                const updateBar = () => {
                    if (!currentTarget || currentTarget.id !== target.id) return; // Зупиняємо якщо модалка змінилась
                    const now = Date.now();
                    const total = target.raid_time * 60 * 1000;
                    const remaining = target.attack_end_ms - now;
                    const width = Math.max(0, (remaining / total) * 100);
                    
                    const bar = document.getElementById('p-bar');
                    if (bar) bar.style.width = width + '%';
                    
                    if(width > 0) requestAnimationFrame(updateBar);
                    else {
                        document.getElementById('m-time').innerHTML = "ОБРОБКА ДАНИХ...";
                    }
                };
                updateBar();
                document.getElementById('m-time').innerHTML = '<span class="status-siege">ЙДЕ ШТУРМ...</span>';
            } else {
                attackBtn.style.display = 'block';
                document.getElementById('m-time').innerText = `${target.raid_time} хв`;
            }

            document.getElementById('m-mine').innerText = `${target.mine_level} рівень`;
            document.getElementById('m-power').innerText = target.power;
            document.getElementById('m-loot').innerText = `~${target.loot_coins} 🪙`;
            
            const chanceEl = document.getElementById('m-chance');
            chanceEl.innerText = `${target.win_chance}%`;
            
            chanceEl.className = '';
            if (target.win_chance >= 65) chanceEl.classList.add('chance-high');
            else if (target.win_chance >= 35) chanceEl.classList.add('chance-med');
            else chanceEl.classList.add('chance-low');

            overlay.style.display = 'flex';
            setTimeout(() => {
                overlay.style.opacity = '1';
                modalContent.style.transform = 'scale(1)';
            }, 10);
        }

        function closeModal() {
            overlay.style.opacity = '0';
            modalContent.style.transform = 'scale(0.9)';
            setTimeout(() => { overlay.style.display = 'none'; }, 300);
            currentTarget = null;
        }

        document.getElementById('m-attack-btn').onclick = async function() {
            if (!currentTarget) return;
            const btn = this;
            btn.innerText = "ІНІЦІАЛІЗАЦІЯ...";
            btn.disabled = true;
            tg.HapticFeedback.impactOccurred('heavy');

            try {
                const response = await fetch('/api/raid/attack', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        family_id: familyId, user_id: userId,
                        target_id: currentTarget.id, raid_time: currentTarget.raid_time
                    })
                });

                const data = await response.json();
                if (data.error) {
                    alert(data.error);
                    btn.innerText = "🚀 АТАКУВАТИ";
                    btn.disabled = false;
                    return;
                }
                
                if(data.success) tg.HapticFeedback.notificationOccurred('success');

                tg.showAlert(`Флот відправлено на координати!\nОчікуваний час місії: ${currentTarget.raid_time} хв.\nКомандування відправить звіт у бот.`, () => {
                    tg.close();
                });

            } catch (err) {
                alert("Помилка зв'язку з командуванням!");
                btn.innerText = "🚀 АТАКУВАТИ";
                btn.disabled = false;
            }
        };

        // Запуск радару
        setTimeout(fetchTargets, 600);
    </script>
</body>
</html>
