<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Центр Зв'язку</title>
    <link rel="stylesheet" href="CSS/Earth.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { padding: 20px; text-align: center; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 90vh; }
        .header-title { font-size: 26px; font-weight: bold; text-shadow: 0 0 10px var(--accent-cyan); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 2px;}
        .desc { color: #aaa; font-size: 14px; margin-bottom: 25px; line-height: 1.5; }
        
        textarea {
            width: 100%; height: 160px; background: rgba(10, 15, 30, 0.85);
            border: 2px solid var(--accent-cyan); border-radius: 15px;
            color: white; padding: 15px; font-family: 'Courier New', Courier, monospace;
            font-size: 16px; resize: none; box-sizing: border-box; outline: none;
            transition: all 0.3s ease; backdrop-filter: blur(10px);
        }
        textarea:focus { box-shadow: 0 0 20px rgba(0, 243, 255, 0.4); }
        
        .action-btn { 
            display: block; width: 100%; padding: 15px; margin-top: 25px; 
            background: rgba(0, 243, 255, 0.05); border: 1px solid var(--accent-cyan); 
            color: var(--accent-cyan); border-radius: 10px; font-size: 16px; 
            font-weight: bold; cursor: pointer; transition: all 0.3s ease; 
        }
        .action-btn:hover { background: var(--accent-cyan); color: #000; box-shadow: 0 0 20px var(--accent-cyan); transform: scale(1.02); }
        
        .status { margin-top: 20px; font-size: 18px; font-weight: bold; color: #00ff64; display: none; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        
        .anim-mail { font-size: 60px; margin-bottom: 10px; filter: drop-shadow(0 0 15px rgba(0, 243, 255, 0.5)); }
    </style>
</head>
<body>
    <div id="space-container"></div>
    
    <div class="anim-mail">📡</div>
    <div class="header-title">Центр Зв'язку</div>
    <div class="desc">Знайшли баг? Маєте круту ідею для планети? Напишіть нам, і повідомлення миттєво надійде розробнику!</div>

    <textarea id="feedbackText" placeholder="Опишіть вашу ідею або проблему тут..."></textarea>
    <button class="action-btn" id="sendBtn" onclick="sendFeedback()">🚀 Відправити рапорт</button>
    
    <div id="statusMsg" class="status">✅ Рапорт успішно доставлено Командуванню!</div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        async function sendFeedback() {
            const text = document.getElementById('feedbackText').value.trim();
            if (!text) {
                tg.HapticFeedback.notificationOccurred('warning');
                return;
            }

            document.getElementById('sendBtn').disabled = true;
            document.getElementById('sendBtn').innerText = "Відправка...";

            // 🔥 БЕЗПЕЧНЕ ОТРИМАННЯ ДАНИХ ГРАВЦЯ БЕЗ URL
            const user = tg.initDataUnsafe?.user;
            const userId = user?.id || 'Невідомо';
            const username = user?.username || user?.first_name || 'Анонімний Пілот';

            try {
                const res = await fetch('/api/feedback', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id: userId, username: username, text: text })
                });

                if (res.ok) {
                    tg.HapticFeedback.notificationOccurred('success');
                    document.getElementById('feedbackText').style.display = 'none';
                    document.getElementById('sendBtn').style.display = 'none';
                    document.getElementById('statusMsg').style.display = 'block';
                    
                    // Закриваємо вікно через 2.5 секунди
                    setTimeout(() => tg.close(), 2500); 
                }
            } catch (err) {
                console.error(err);
                document.getElementById('sendBtn').disabled = false;
                document.getElementById('sendBtn').innerText = "🚀 Відправити рапорт";
                tg.HapticFeedback.notificationOccurred('error');
            }
        }
    </script>
</body>
</html>
